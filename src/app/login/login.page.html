<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>login</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">login</ion-title>
    </ion-toolbar>
  </ion-header>
  <form #frmRegistro="ngForm" (ngSubmit)="login(frmRegistro)">
    <ion-item>
      <ion-input name="email" [(ngModel)]="email" label="Correo electronico" labelPlacement="floating" required></ion-input>
    </ion-item>
    <ion-item>
      <ion-input name="password" [(ngModel)]="password" label="Contraseña" labelPlacement="stacked" required></ion-input>
    </ion-item>
    <ion-button type="submit">
      Iniciar sesion
    </ion-button>
  </form>
</ion-content>
